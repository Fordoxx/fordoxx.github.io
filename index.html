<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Философия — Тест 1 уровня</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card2: #16213e;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --correct: #10b981;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #2d2d4e;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .screen { display: none; width: 100%; max-width: 760px; }
  .screen.active { display: block; }

  /* ── WELCOME ── */
  #welcome {
    text-align: center;
    background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 60px 40px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }
  .logo { font-size: 64px; margin-bottom: 20px; }
  #welcome h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 10px; background: linear-gradient(135deg, #a855f7, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #welcome .subtitle { color: var(--muted); font-size: 1rem; margin-bottom: 40px; line-height: 1.6; }
  .stats-row { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; flex-wrap: wrap; }
  .stat-box { background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); border-radius: 14px; padding: 16px 28px; }
  .stat-box .num { font-size: 2rem; font-weight: 700; color: var(--accent2); }
  .stat-box .lbl { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
  .btn-start {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 14px;
    padding: 16px 48px; font-size: 1.1rem; font-weight: 600;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 25px rgba(124,58,237,0.4);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(124,58,237,0.55); }

  /* ── QUIZ ── */
  #quiz { }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
  .q-counter { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
  .progress-wrap { flex: 1; background: var(--border); border-radius: 99px; height: 8px; }
  .progress-bar { height: 8px; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s ease; }
  .score-badge { background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.4); border-radius: 99px; padding: 4px 14px; font-size: 0.82rem; color: var(--accent2); white-space: nowrap; }

  .q-card {
    background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
    border: 1px solid var(--border); border-radius: 20px; padding: 36px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .q-num { font-size: 0.8rem; color: var(--accent2); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .q-text { font-size: 1.15rem; font-weight: 500; line-height: 1.6; margin-bottom: 28px; }

  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    background: rgba(255,255,255,0.04); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 16px 20px;
    cursor: pointer; font-size: 0.95rem; line-height: 1.5;
    transition: all 0.18s ease; display: flex; align-items: center; gap: 14px;
  }
  .option:hover:not(.disabled) { border-color: var(--accent2); background: rgba(124,58,237,0.1); transform: translateX(4px); }
  .option .opt-letter {
    width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700; flex-shrink: 0;
    color: var(--muted); background: rgba(255,255,255,0.04);
    transition: all 0.18s;
  }
  .option:hover:not(.disabled) .opt-letter { border-color: var(--accent2); color: var(--accent2); }
  .option.correct { border-color: var(--correct); background: rgba(16,185,129,0.12); }
  .option.correct .opt-letter { border-color: var(--correct); background: var(--correct); color: #fff; }
  .option.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.1); }
  .option.wrong .opt-letter { border-color: var(--wrong); background: var(--wrong); color: #fff; }
  .option.disabled { cursor: default; }

  .feedback {
    margin-top: 20px; padding: 14px 18px; border-radius: 12px;
    font-size: 0.9rem; font-weight: 500; display: none; align-items: center; gap: 10px;
  }
  .feedback.show { display: flex; animation: fadeIn 0.2s; }
  .feedback.ok { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #34d399; }
  .feedback.err { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }

  .btn-next {
    margin-top: 24px; width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 12px;
    padding: 15px; font-size: 1rem; font-weight: 600;
    cursor: pointer; display: none; transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 6px 20px rgba(124,58,237,0.4);
  }
  .btn-next.show { display: block; animation: fadeIn 0.2s; }
  .btn-next:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(124,58,237,0.5); }

  /* ── RESULT ── */
  #result {
    text-align: center;
    background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
    border: 1px solid var(--border); border-radius: 24px;
    padding: 60px 40px; box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }
  .result-emoji { font-size: 72px; margin-bottom: 16px; }
  #result h2 { font-size: 1.9rem; font-weight: 700; margin-bottom: 10px; }
  .result-sub { color: var(--muted); margin-bottom: 36px; font-size: 0.95rem; }
  .circle-wrap { margin: 0 auto 36px; position: relative; width: 160px; height: 160px; }
  .circle-wrap svg { transform: rotate(-90deg); }
  .circle-bg { fill: none; stroke: var(--border); stroke-width: 10; }
  .circle-fg { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .circle-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .circle-text .pct { font-size: 2rem; font-weight: 700; }
  .circle-text .pct-lbl { font-size: 0.75rem; color: var(--muted); }

  .result-stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 36px; flex-wrap: wrap; }
  .rs-box { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 14px; padding: 16px 24px; min-width: 100px; }
  .rs-box .rv { font-size: 1.6rem; font-weight: 700; }
  .rs-box .rl { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .rs-box.green .rv { color: var(--correct); }
  .rs-box.red .rv { color: var(--wrong); }

  .grade-badge { display: inline-block; padding: 10px 28px; border-radius: 99px; font-weight: 700; font-size: 1rem; margin-bottom: 36px; }
  .grade-A { background: rgba(16,185,129,0.2); border: 1px solid rgba(16,185,129,0.4); color: #34d399; }
  .grade-B { background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.4); color: #60a5fa; }
  .grade-C { background: rgba(234,179,8,0.2); border: 1px solid rgba(234,179,8,0.4); color: #fbbf24; }
  .grade-D { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.35); color: #f87171; }

  .btns-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-retry {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 12px;
    padding: 14px 36px; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; box-shadow: 0 6px 20px rgba(124,58,237,0.4);
    transition: transform 0.2s;
  }
  .btn-retry:hover { transform: translateY(-2px); }
  .btn-home {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text); border-radius: 12px;
    padding: 14px 36px; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-home:hover { background: rgba(255,255,255,0.1); }

  @media (max-width: 500px) {
    #welcome, #result { padding: 40px 24px; }
    .q-card { padding: 24px; }
    #welcome h1 { font-size: 1.7rem; }
    .q-text { font-size: 1rem; }
  }
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <div class="logo">🧠</div>
  <h1>Философия</h1>
  <p class="subtitle">Тренажёр для подготовки к тесту<br>1 уровень · Базовый курс</p>
  <div class="stats-row">
    <div class="stat-box"><div class="num" id="totalQ">—</div><div class="lbl">вопросов</div></div>
    <div class="stat-box"><div class="num">4</div><div class="lbl">варианта</div></div>
    <div class="stat-box"><div class="num">∞</div><div class="lbl">попыток</div></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">Начать тест →</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="top-bar">
    <span class="q-counter" id="qCounter">1 / 150</span>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <span class="score-badge" id="scoreBadge">✓ 0</span>
  </div>
  <div class="q-card">
    <div class="q-num" id="qNum">Вопрос 1</div>
    <div class="q-text" id="qText">...</div>
    <div class="options" id="optionsWrap"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">Следующий вопрос →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-emoji" id="resultEmoji">🎉</div>
  <h2 id="resultTitle">Результат</h2>
  <p class="result-sub" id="resultSub"></p>
  <div class="circle-wrap">
    <svg width="160" height="160" viewBox="0 0 160 160">
      <circle class="circle-bg" cx="80" cy="80" r="70"/>
      <circle class="circle-fg" id="circleFg" cx="80" cy="80" r="70" stroke="#7c3aed"
        stroke-dasharray="439.82"
        stroke-dashoffset="439.82"/>
    </svg>
    <div class="circle-text">
      <div class="pct" id="pctText">0%</div>
      <div class="pct-lbl">верных</div>
    </div>
  </div>
  <div class="result-stats">
    <div class="rs-box green"><div class="rv" id="rsCorrect">0</div><div class="rl">Правильно</div></div>
    <div class="rs-box red"><div class="rv" id="rsWrong">0</div><div class="rl">Неверно</div></div>
    <div class="rs-box"><div class="rv" id="rsTotal">0</div><div class="rl">Всего</div></div>
  </div>
  <div class="grade-badge" id="gradeBadge"></div>
  <div class="btns-row">
    <button class="btn-retry" onclick="startQuiz()">Пройти заново</button>
    <button class="btn-home" onclick="goHome()">На главную</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  { q: "Слово «философия» в переводе с греческого означает любовь к…", a: "мудрости", w: ["власти", "истине", "знанию"] },
  { q: "Слово «философия» первым использовал для обозначения своих занятий древнегреческий мыслитель", a: "Пифагор", w: ["Фалес", "Анаксимен", "Аристотель"] },
  { q: "Принцип философствования Сократа", a: "Я знаю, что ничего не знаю", w: ["Всё течёт.", "Все есть число", "Человек есть мера всех вещей"] },
  { q: "Философия опирается на…", a: "мышление", w: ["мистику", "эмоции", "веру"] },
  { q: "Философия как особый вид духовной деятельности ориентирована на…", a: "поиск истины", w: ["отказ от сомнений", "оправдание веры", "получение власти"] },
  { q: "Особенность, отличающая постановку философских проблем", a: "личностный характер", w: ["стремление к известности", "мистическая интуиция", "отрицание разума"] },
  { q: "Форма умственной деятельности человека, направленная на осмысление своих действий, культуры и её оснований", a: "рефлексия", w: ["рассудок", "воображение", "ощущение"] },
  { q: "Эвристические возможности философии определяются", a: "творчески-критическим отношением к миру", w: ["запоминанием готового знания", "отказом от самостоятельного мышления", "признанием бессмысленности мира"] },
  { q: "С культурой мышления связана", a: "логика", w: ["мистика", "магия", "догматика"] },
  { q: "Культура мышления помогает преодолеть недостатки стихийного мышления. Какое мышление она также помогает преодолеть?", a: "стереотипного мышления", w: ["творческого мышления", "критического мышления", "когнитивного мышления"] },
  { q: "Важный элемент развитой культуры мышления", a: "критическое мышление", w: ["стихийное мышление", "стереотипное мышление", "ситуативное мышление"] },
  { q: "Принцип философской рефлексии древнегреческого мудреца Сократа", a: "«Познай самого себя»", w: ["«Бытие есть, небытия нет»", "«Живи незаметно»", "«Все течет»"] },
  { q: "Эвристические возможности философии проявляются в…", a: "разработке новых идей и методов", w: ["критическом отношении к творчеству", "отказе от рациональных доказательств", "опоре только на повседневный опыт"] },
  { q: "Важный элемент философского мышления, способствующий появлению инновационных решений", a: "сомнение", w: ["абсолютизация", "гармония", "хаотичность"] },
  { q: "Согласно Аристотелю, именно это состояние побуждает людей философствовать", a: "удивление", w: ["возмущение", "равнодушие", "гнев"] },
  { q: "Согласно Ф. Энгельсу основной вопрос философии – это вопрос об отношении", a: "мышления к бытию", w: ["объекта к субъекту", "культуры к природе", "творчества к разуму"] },
  { q: "Философия как способ продуктивного творческого мышления связана с…", a: "эвристикой", w: ["топонимикой", "метрологией", "термодинамикой"] },
  { q: "Отличительная характеристика философии как мировоззрения", a: "рациональность", w: ["хаотичность", "иллюзорность", "сверхъестественность"] },
  { q: "Одна из основных функций философии", a: "мировоззренческая", w: ["символическая", "фактологическая", "мистическая"] },
  { q: "Функция философии, которая связана с выработкой универсальных способов и приемов теоретической и практической деятельности человека", a: "методологическая", w: ["воспитательная", "компенсаторная", "аксиологическая"] },
  { q: "Исторически первый тип мировоззрения", a: "Мифология", w: ["Антропософия", "Религия", "Философия"] },
  { q: "К основным разделам философского знания относится", a: "Онтология", w: ["Теология", "Палеонтология", "Лингвистика"] },
  { q: "Раздел философского знания, связанный с размышлениями о человеке", a: "Антропология", w: ["Эпистемология", "Онтология", "Гносеология"] },
  { q: "Раздел философского знания, связанный с размышлениями о познании", a: "Гносеология", w: ["Онтология", "Этика", "Антропология"] },
  { q: "Раздел философского знания, связанный с размышлениями о бытии", a: "Онтология", w: ["Антропология", "Гносеология", "Аксиология"] },
  { q: "Раздел философского знания, связанный с размышлениями о ценностях", a: "Аксиология", w: ["Гносеология", "Онтология", "Антропология"] },
  { q: "Раздел философского знания, связанный с размышлениями о морали и нравственности", a: "Этика", w: ["Онтология", "Герменевтика", "Эстетика"] },
  { q: "Раздел философского знания, связанный с размышлениями о прекрасном и возвышенном", a: "Эстетика", w: ["Герменевтика", "Софистика", "Антропология"] },
  { q: "Методологическая функция философии связана с разработкой…", a: "рациональных способов деятельности человека", w: ["военной стратегии и тактики", "чувственных методов политической борьбы", "принципов экономической деятельности"] },
  { q: "К числу основных вопросов, которыми занимается философия, немецкий мыслитель И. Кант относил", a: "Что я могу знать?", w: ["Быть или не быть?", "Из чего все произошло?", "Что есть природа?"] },
  { q: "Мировоззренческая функция философии", a: "Связана с наиболее общими вопросами бытия и познания", w: ["Определяет ранние формы религии", "Связана с повседневной деятельностью", "Указывает на вторичность сознания"] },
  { q: "Специфика философского размышления о мире определяется", a: "Размышлением над фундаментальными вопросами существования мира и человека", w: ["Бессознательным восприятием реальности", "Верой в сверхъестественные силы", "Эмоционально-чувственным отношением человека к своему социальному статусу"] },
  { q: "Гносеологическая функция философии связана с…", a: "установлением возможностей человеческого познания", w: ["поисками социальной гармонии", "выработкой целостной теории человека", "утверждением приоритета идеального"] },
  { q: "Исторический тип мировоззрения, связанный с верой в сверхъестественное", a: "религия", w: ["философия", "диалектика", "наука"] },
  { q: "Специфическая черта философского знания", a: "рациональность", w: ["антропоморфизм", "догматизм", "тотемизм"] },
  { q: "Философию можно рассматривать как", a: "универсальное знание", w: ["священное знание", "эзотерическое знание", "частную науку"] },
  { q: "Ответы на философские вопросы ищут в…", a: "доводах и умозаключениях разума", w: ["мистическом озарении", "повседневном опыте", "откровении"] },
  { q: "Религию, миф и философию объединяет", a: "постановка мировоззренческих вопросов", w: ["рефлексия", "агностицизм", "рационализм"] },

let questions = [];
let current = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  return arr.slice().sort(() => Math.random() - 0.5);
}

function startQuiz() {
  questions = shuffle(ALL_QUESTIONS);
  current = 0;
  score = 0;
  answered = false;
  document.getElementById('totalQ').textContent = questions.length;
  showScreen('quiz');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion() {
  const q = questions[current];
  const total = questions.length;
  const pct = Math.round((current / total) * 100);

  document.getElementById('qCounter').textContent = `${current + 1} / ${total}`;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('scoreBadge').textContent = `✓ ${score}`;
  document.getElementById('qNum').textContent = `Вопрос ${current + 1}`;
  document.getElementById('qText').textContent = q.q;

  const opts = shuffle([q.a, ...q.w]);
  const letters = ['А', 'Б', 'В', 'Г'];
  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';

  opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    div.onclick = () => selectAnswer(div, opt, q.a);
    wrap.appendChild(div);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  const btn = document.getElementById('btnNext');
  btn.className = 'btn-next';
  btn.textContent = current + 1 < questions.length ? 'Следующий вопрос →' : 'Показать результат →';
  answered = false;
}

function selectAnswer(el, chosen, correct) {
  if (answered) return;
  answered = true;

  const allOpts = document.querySelectorAll('.option');
  allOpts.forEach(o => {
    o.classList.add('disabled');
    const txt = o.querySelector('span:last-child').textContent;
    if (txt === correct) o.classList.add('correct');
  });

  const fb = document.getElementById('feedback');
  if (chosen === correct) {
    score++;
    el.classList.add('correct');
    fb.className = 'feedback ok show';
    fb.innerHTML = '✅ Верно!';
  } else {
    el.classList.add('wrong');
    fb.className = 'feedback err show';
    fb.innerHTML = `❌ Неверно. Правильный ответ: <strong>${correct}</strong>`;
  }

  document.getElementById('scoreBadge').textContent = `✓ ${score}`;
  document.getElementById('btnNext').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  showScreen('result');
  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('pctText').textContent = pct + '%';
  document.getElementById('rsCorrect').textContent = score;
  document.getElementById('rsWrong').textContent = total - score;
  document.getElementById('rsTotal').textContent = total;

  const circ = document.getElementById('circleFg');
  const circumference = 2 * Math.PI * 70;
  const offset = circumference - (pct / 100) * circumference;

  let grade, emoji, title, sub, cls, color;
  if (pct >= 90) {
    grade = '🏆 Отлично'; emoji = '🎉'; title = 'Превосходный результат!';
    sub = 'Вы отлично знаете материал.'; cls = 'grade-A'; color = '#10b981';
  } else if (pct >= 75) {
    grade = '👍 Хорошо'; emoji = '😊'; title = 'Хороший результат!';
    sub = 'Повторите несколько тем для закрепления.'; cls = 'grade-B'; color = '#3b82f6';
  } else if (pct >= 50) {
    grade = '📖 Удовлетворительно'; emoji = '🤔'; title = 'Есть над чем работать';
    sub = 'Рекомендуем повторить материал.'; cls = 'grade-C'; color = '#eab308';
  } else {
    grade = '❗ Нужно повторить'; emoji = '💪'; title = 'Не сдавайтесь!';
    sub = 'Изучите теорию и попробуйте снова.'; cls = 'grade-D'; color = '#ef4444';
  }

  circ.style.stroke = color;
  setTimeout(() => { circ.style.strokeDashoffset = offset; }, 100);

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;
  const gb = document.getElementById('gradeBadge');
  gb.textContent = grade;
  gb.className = 'grade-badge ' + cls;
}

function goHome() {
  document.getElementById('totalQ').textContent = ALL_QUESTIONS.length;
  showScreen('welcome');
}

// init
document.getElementById('totalQ').textContent = ALL_QUESTIONS.length;
document.getElementById('circleFg').style.strokeDasharray = 2 * Math.PI * 70;
document.getElementById('circleFg').style.strokeDashoffset = 2 * Math.PI * 70;
</script>
