<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Metrics Simulator | By Rysbek</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #f9f9f9; padding: 20px; border-radius: 8px; }
        .control-group { display: flex; flex-direction: column; }
        .control-group label { font-weight: bold; margin-bottom: 8px; font-size: 0.9em; }
        .control-group input { cursor: pointer; }
        .full-width { grid-column: 1 / -1; }
        
        .viz-section { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; align-items: start; }
        canvas { background: #fff; border-radius: 8px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .matrix-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.85em; }
        .matrix-table th, .matrix-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .matrix-table th { background: #eee; }
        .label-cell { font-weight: bold; background: #f5f5f5; }
        
        .metric-card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .metric-value { display: block; font-size: 1.5em; font-weight: bold; color: #2980b9; }
        .metric-name { font-size: 0.8em; color: #7f8c8d; text-transform: uppercase; }
        
        .highlight-tp { background-color: rgba(46, 204, 113, 0.2); }
        .highlight-tn { background-color: rgba(52, 152, 219, 0.2); }
        .highlight-fp { background-color: rgba(231, 76, 60, 0.2); }
        .highlight-fn { background-color: rgba(241, 196, 15, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <h1>Тренажер метрик классификации</h1>

    <div class="controls">
        <div class="control-group">
            <label id="label-imbalance">Дисбаланс классов: 5% (фрод)</label>
            <input type="range" id="imbalance" min="1" max="50" value="5">
        </div>
        <div class="control-group">
            <label id="label-separation">Качество модели (AUC): 0.85</label>
            <input type="range" id="separation" min="0" max="30" value="15">
        </div>
        <div class="control-group full-width">
            <label id="label-threshold">Порог отсечения (Threshold): 0.50</label>
            <input type="range" id="threshold" min="0" max="100" value="50">
        </div>
    </div>

    <div class="viz-section">
        <div>
            <canvas id="densityChart"></canvas>
        </div>
        <div class="stats-panel">
            <table class="matrix-table">
                <tr>
                    <th></th>
                    <th>Предсказано: 0</th>
                    <th>Предсказано: 1</th>
                </tr>
                <tr>
                    <td class="label-cell">Реально: 0</td>
                    <td id="val-tn" class="highlight-tn">0</td>
                    <td id="val-fp" class="highlight-fp">0</td>
                </tr>
                <tr>
                    <td class="label-cell">Реально: 1</td>
                    <td id="val-fn" class="highlight-fn">0</td>
                    <td id="val-tp" class="highlight-tp">0</td>
                </tr>
            </table>

            <div class="stats-grid">
                <div class="metric-card"><span id="metric-acc" class="metric-value">0</span><span class="metric-name">Accuracy</span></div>
                <div class="metric-card"><span id="metric-prec" class="metric-value">0</span><span class="metric-name">Precision</span></div>
                <div class="metric-card"><span id="metric-rec" class="metric-value">0</span><span class="metric-name">Recall</span></div>
                <div class="metric-card"><span id="metric-f1" class="metric-value">0</span><span class="metric-name">F1-Score</span></div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
